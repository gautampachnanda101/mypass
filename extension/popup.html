<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Vault</title>
    <style>
      body {
        font-family: sans-serif;
        width: 280px;
        padding: 16px;
        margin: 0;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      input {
        width: 100%;
        padding: 6px 8px;
        margin-bottom: 8px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 8px;
        background: #1a73e8;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background: #1558b0;
      }
      #status {
        margin-top: 10px;
        font-size: 13px;
        color: #555;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 12px 0 0;
      }
      li {
        padding: 8px;
        border: 1px solid #eee;
        border-radius: 4px;
        margin-bottom: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      li:hover {
        background: #f0f4ff;
      }
    </style>
  </head>
  <body>
    <h2>🔐 My Vault</h2>
    <input type="password" id="password" placeholder="Master password" />
    <button id="unlock">Unlock</button>
    <p id="status"></p>
    <ul id="vault-list"></ul>
    <script src="popup.js"></script>
  </body>
</html>
