name: ci-quality-gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality-gates:
    name: Quality gates (${{ matrix.os_name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: ubuntu
            runner: ubuntu-latest
          - os_name: macos
            runner: macos-latest
          - os_name: windows
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run quality gate script
        shell: bash
        run: ./scripts/quality-gate.sh
