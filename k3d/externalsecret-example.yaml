# Example ExternalSecret — resolves secrets from vaultx into a k8s Secret.
#
# The resulting k8s Secret can be mounted as env vars or volumes in any pod.
# Secrets are pulled from the vaultx daemon at deploy time — no secrets in
# manifests, no env files in containers.
#
# Apply:  kubectl apply -f k3d/externalsecret-example.yaml
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: myapp-secrets
  namespace: default
spec:
  refreshInterval: 1h         # re-sync from vaultx every hour
  secretStoreRef:
    name: vaultx
    kind: SecretStore
  target:
    name: myapp-secrets       # name of the resulting k8s Secret
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD  # key in the k8s Secret
      remoteRef:
        key: myapp/db_password  # path in vaultx (resolves from any provider)

    - secretKey: API_KEY
      remoteRef:
        key: myapp/api_key

    - secretKey: JWT_SECRET
      remoteRef:
        key: myapp/jwt_secret
---
# Reference the secret in a Deployment:
#
# env:
#   - name: DB_PASSWORD
#     valueFrom:
#       secretKeyRef:
#         name: myapp-secrets
#         key: DB_PASSWORD
