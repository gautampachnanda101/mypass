# ClusterSecretStore — cluster-wide variant (works across all namespaces).
# Use this instead of SecretStore when you want vaultx available to all
# namespaces without repeating the store definition.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vaultx
spec:
  provider:
    webhook:
      url: "http://host.k3d.internal:7474/externalsecrets/{{ .remoteRef.key }}"
      headers:
        X-Vaultx-Token:
          secretKeyRef:
            name: vaultx-token
            namespace: external-secrets   # token lives in the ESO namespace
            key: token
      result:
        jsonPath: "$.value"
      timeout: 10s
