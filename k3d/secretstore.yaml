# vaultx SecretStore for External Secrets Operator
#
# This tells ESO to resolve secrets by calling the vaultx daemon running
# on the host machine at host.k3d.internal:7474.
#
# Prerequisites:
#   1. vaultx daemon running:  vaultx serve --port 7474
#   2. ESO installed in k3d:   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#   3. Token available:        kubectl create secret generic vaultx-token \
#                                --from-file=token=$HOME/.vaultx/daemon.token
#
# Apply:  kubectl apply -f k3d/secretstore.yaml
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vaultx
  namespace: default
spec:
  provider:
    webhook:
      url: "http://host.k3d.internal:7474/externalsecrets/{{ .remoteRef.key }}"
      headers:
        X-Vaultx-Token:
          secretKeyRef:
            name: vaultx-token
            key: token
      result:
        jsonPath: "$.value"
      # Timeout for secret resolution (Argon2id unlock can be slow on first call)
      timeout: 10s
